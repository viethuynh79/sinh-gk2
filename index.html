<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Hệ Thống Ôn Tập Sinh 12 - Premium Responsive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&family=Inter:wght@400;500;600;800&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --text-main: #1d1d1f;
            --success: #34c759;
            --danger: #ff3b30;
            --accent: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #f5f5f7;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- BACKGROUND MESH LIQUID ANIMATION --- */
        .blob-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: #e0c3fc; }
        .blob { position: absolute; filter: blur(80px); opacity: 0.8; animation: float 12s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate; }
        .blob1 { background: #ff9a9e; width: 50vw; height: 50vw; top: -10%; left: -10%; }
        .blob2 { background: #fecfef; width: 40vw; height: 40vw; bottom: -10%; right: -5%; animation-delay: -3s; }
        .blob3 { background: #a18cd1; width: 45vw; height: 45vw; top: 30%; left: 40%; animation-delay: -6s; }
        .blob4 { background: #8fd3f4; width: 35vw; height: 35vw; bottom: 20%; left: 10%; animation-delay: -9s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.05); }
            100% { transform: translate(-5%, -5%) scale(0.95); }
        }

        /* --- LIQUID GLASS COMPONENTS --- */
        .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
        
        h1 { text-align: center; font-weight: 800; font-size: 2.5em; margin-bottom: 40px; background: linear-gradient(135deg, #1d1d1f, #434343); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        
        h2 { 
            margin: 40px 0 20px; padding: 15px 25px; border-radius: 16px; font-weight: 800; font-size: 1.3em;
            background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); color: var(--accent);
        }

        .glass-card { 
            background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; margin-bottom: 25px; 
            box-shadow: var(--glass-shadow); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease-out both;
        }
        
        /* Hiệu ứng hover chỉ áp dụng trên máy tính (thiết bị có chuột) */
        @media (hover: hover) {
            .glass-card:hover { transform: translateY(-5px) scale(1.01); }
            .opt-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.9); transform: translateX(5px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
            .tf-btn:hover:not(:disabled) { background: #fff; transform: translateY(-2px); color: var(--accent); }
            .sa-submit:hover:not(:disabled) { background: #005bb5; transform: scale(1.05); }
        }

        .q-text { font-size: 1.15em; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }

        /* --- BUTTONS & INPUTS --- */
        .opt-btn { 
            display: block; width: 100%; text-align: left; padding: 16px 20px; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255,255,255,0.8); border-radius: 14px;
            font-size: 1em; cursor: pointer; font-family: 'Inter', sans-serif; color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.03); line-height: 1.4;
        }

        .tf-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);}
        .tf-text { flex: 1; padding-right: 20px; font-size: 1em; font-weight: 500; line-height: 1.4;}
        .tf-actions { display: flex; gap: 10px; }
        .tf-btn { padding: 10px 20px; border: 1px solid rgba(255,255,255,0.8); border-radius: 12px; cursor: pointer; font-weight: 600; background: rgba(255, 255, 255, 0.6); transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.03);}

        .sa-wrap { display: flex; gap: 15px; }
        .sa-input { flex: 1; padding: 15px 20px; border: 1px solid rgba(255,255,255,0.8); border-radius: 14px; background: rgba(255, 255, 255, 0.6); font-size: 1.05em; outline: none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);}
        .sa-input:focus { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); }
        .sa-submit { padding: 15px 30px; background: var(--accent); color: #fff; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 1.05em; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);}

        /* --- STATES & ANIMATIONS --- */
        .correct { background: var(--success) !important; color: #fff !important; border-color: var(--success) !important; font-weight: 600; animation: liquidPulse 0.5s ease; box-shadow: 0 8px 20px rgba(52, 199, 89, 0.4) !important;}
        .incorrect { background: var(--danger) !important; color: #fff !important; border-color: var(--danger) !important; font-weight: 600; animation: shake 0.4s ease; box-shadow: 0 8px 20px rgba(255, 59, 48, 0.4) !important;}
        
        .explanation { 
            display: none; margin-top: 20px; padding: 18px 20px; 
            background: rgba(255, 255, 255, 0.7); border-left: 5px solid var(--accent); border-radius: 12px; 
            font-size: 0.95em; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0; transform: translateY(-15px); line-height: 1.5;
        }
        .explanation b { color: var(--accent); font-weight: 800; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes liquidPulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); background: #3fe268; } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
        @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

        /* ========================================= */
        /* --- MOBILE RESPONSIVE (SMARTPHONES) --- */
        /* ========================================= */
        @media screen and (max-width: 768px) {
            body { padding: 15px 10px; }
            h1 { font-size: 1.8em; margin-bottom: 25px; letter-spacing: -0.5px; }
            h2 { font-size: 1.1em; padding: 12px 15px; margin: 30px 0 15px; border-radius: 12px; }
            
            .glass-card { padding: 20px 15px; margin-bottom: 20px; border-radius: 18px; }
            .q-text { font-size: 1.05em; margin-bottom: 15px; }
            
            .opt-btn { padding: 14px 15px; font-size: 0.95em; border-radius: 12px; margin-bottom: 10px; }
            
            /* Giao diện Đúng/Sai xếp dọc trên điện thoại */
            .tf-row { flex-direction: column; align-items: flex-start; gap: 12px; padding-bottom: 15px; }
            .tf-text { padding-right: 0; width: 100%; }
            .tf-actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
            .tf-btn { padding: 12px; font-size: 0.95em; border-radius: 10px; width: 100%; }
            
            /* Giao diện Điền khuyết xếp dọc trên điện thoại */
            .sa-wrap { flex-direction: column; gap: 10px; }
            .sa-input { padding: 14px; font-size: 1em; border-radius: 12px; width: 100%; }
            .sa-submit { padding: 14px; font-size: 1em; border-radius: 12px; width: 100%; }
            
            .explanation { padding: 15px; font-size: 0.9em; margin-top: 15px; }
            
            /* Chỉnh lại độ tụ sáng của blobs trên mobile */
            .blob { filter: blur(50px); }
            .blob1 { width: 80vw; height: 80vw; }
            .blob2 { width: 70vw; height: 70vw; }
            .blob3 { width: 75vw; height: 75vw; }
            .blob4 { width: 60vw; height: 60vw; }
        }
    </style>
</head>
<body>

<div class="blob-container">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
</div>

<div class="container">
    <h1>HỆ THỐNG ÔN TẬP SINH 12</h1>
    
    <h2>PHẦN I: TRẮC NGHIỆM NHIỀU LỰA CHỌN (49 Câu)</h2>
    <div id="part1-container"></div>

    <h2>PHẦN II: TRẮC NGHIỆM ĐÚNG / SAI (11 Câu)</h2>
    <div id="part2-container"></div>

    <h2>PHẦN III: TRẢ LỜI NGẮN (10 Câu)</h2>
    <div id="part3-container"></div>
</div>

<script>
// ==================== DỮ LIỆU FULL ĐỀ CƯƠNG ====================

const part1Data = [
    { q: "Câu 1. Bằng chứng tiến hóa trực tiếp?", opts: ["A. Cơ quan tương tự.", "B. Cơ quan thoái hóa.", "C. Hóa thạch xương khủng long.", "D. Cơ quan tương đồng."], ans: 2, exp: "Hóa thạch là bằng chứng trực tiếp." },
    { q: "Câu 2. Xương chi trước sư tử biển, cá sấu, mèo tương đồng. Đây là bằng chứng?", opts: ["A. Sinh học phân tử.", "B. Giải phẫu so sánh.", "C. Tế bào học.", "D. Hóa thạch."], ans: 1, exp: "Nghiên cứu cấu tạo các cơ quan là Giải phẫu so sánh." },
    { q: "Câu 3. Bằng chứng tiến hóa nào là tế bào học?", opts: ["A. Tất cả cơ thể sinh vật đều cấu tạo từ tế bào.", "B. Gai xương rồng, tua cuốn là biến dạng của lá.", "C. DNA cấu tạo từ 4 loại nucleotide.", "D. Sử dụng chung bộ mã di truyền."], ans: 0, exp: "Ý C, D là sinh học phân tử. Ý A là bằng chứng tế bào học." },
    { q: "Câu 4. Trình tự nucleotide gene giống nhau. Đây là bằng chứng:", opts: ["A. sinh học phân tử.", "B. tế bào học.", "C. giải phẫu so sánh.", "D. hóa thạch."], ans: 0, exp: "Nghiên cứu ở mức độ DNA, gene là sinh học phân tử." },
    { q: "Câu 5. Có bao nhiêu ví dụ là cơ quan thoái hóa? (1) Răng khôn, (2) Manh tràng thú ăn thịt, (3) Túi bụng Kangaroo, (4) Chi sau thú biển.", opts: ["A. 1", "B. 2", "C. 3", "D. 4"], ans: 2, exp: "Gồm (1), (2), (4). Túi bụng kangaroo là cơ quan đang phát triển bình thường." },
    { q: "Câu 6. Trình tự gần gũi với người nhất (dựa vào nucleotide):", opts: ["A. Người -> Tinh tinh -> Đười ươi -> Gorilla.", "B. Người -> Đười ươi -> Tinh tinh -> Gorilla.", "C. Người -> Gorilla -> Tinh tinh -> Đười ươi.", "D. Người -> Tinh tinh -> Gorilla -> Đười ươi."], ans: 3, exp: "Sai khác so với người: Tinh tinh (1), Gorilla (2), Đười ươi (3)." },
    { q: "Câu 7. Bằng chứng trực tiếp?", opts: ["A. Bộ xương người Việt Cổ.", "B. Amino acid chuỗi β-hemoglobin.", "C. Sinh vật cấu tạo từ tế bào.", "D. Chi trước của mèo và cánh dơi."], ans: 0, exp: "Bộ xương (hóa thạch) là bằng chứng trực tiếp." },
    { q: "Câu 8. Bằng chứng KHÔNG trực tiếp?", opts: ["A. Di tích xương đai hông cá voi.", "B. Xác voi ma mút trong băng.", "C. Đốt xương khủng long.", "D. Xác sâu bọ trong hổ phách."], ans: 0, exp: "Di tích xương cá voi hiện nay là cơ quan thoái hóa (gián tiếp)." },
    { q: "Câu 9. Họ hàng loài A với B(92%), C(88%), D(94%), E(96%):", opts: ["A. A -> B -> C -> D -> E.", "B. A -> E -> D -> B -> C.", "C. A -> D -> E -> C -> B.", "D. A -> B -> C -> E -> D."], ans: 1, exp: "Tỉ lệ phần trăm càng cao thì quan hệ càng gần (E > D > B > C)." },
    { q: "Câu 10. Tại sao cơ quan thoái hóa không bị đào thải?", opts: ["A. Không gây hại, thời gian chưa đủ dài.", "B. Không chức năng nên không ảnh hưởng.", "C. Loại bỏ sẽ ảnh hưởng cơ quan khác.", "D. Là cơ quan khác nguồn gốc."], ans: 0, exp: "CLTN chỉ đào thải tính trạng có hại. Do không gây hại và thời gian chưa đủ dài." },
    { q: "Câu 11. Các bước Darwin xây dựng học thuyết:", opts: ["A. Quan sát -> giả thuyết -> kiểm chứng -> học thuyết.", "B. Quan sát -> học thuyết -> giả thuyết -> kiểm chứng.", "C. Giả thuyết -> kiểm chứng -> học thuyết -> quan sát.", "D. Học thuyết -> quan sát -> giả thuyết -> kiểm chứng."], ans: 0, exp: "Tuân theo phương pháp nghiên cứu khoa học chung." },
    { q: "Câu 12. Nguồn nguyên liệu chủ yếu theo Darwin:", opts: ["A. Đột biến cấu trúc NST.", "B. Biến dị cá thể.", "C. Đột biến gene.", "D. Đột biến số lượng NST."], ans: 1, exp: "Darwin chưa biết về đột biến, ông gọi chung là biến dị cá thể." },
    { q: "Câu 13. Nhân tố quy định chiều hướng tiến hóa vật nuôi, cây trồng:", opts: ["A. Chọn lọc nhân tạo.", "B. Chọn lọc tự nhiên.", "C. Biến dị cá thể.", "D. Biến dị xác định."], ans: 0, exp: "Vật nuôi, cây trồng do con người định hướng bằng CL Nhân Tạo." },
    { q: "Câu 14. Đối tượng tác động của CLTN theo Darwin:", opts: ["A. Quần thể.", "B. Hệ sinh thái.", "C. Quần xã.", "D. Cá thể."], ans: 3, exp: "Theo Darwin là cá thể. Theo tiến hóa hiện đại là quần thể." },
    { q: "Câu 15. Hạn chế chủ yếu của Darwin:", opts: ["A. Chưa giải thích đặc điểm thích nghi.", "B. Chưa đi sâu hình thành loài.", "C. Chưa hiểu rõ nguyên nhân và di truyền biến dị.", "D. Chưa quan niệm đúng về đấu tranh sinh tồn."], ans: 2, exp: "Thời đó chưa có kiến thức về di truyền học (DNA, gene)." },
    { q: "Câu 16. Bản chất CLTN theo Darwin:", opts: ["A. Phân hóa sống sót & sinh sản cá thể kiểu gen khác nhau.", "B. Phân hóa sống sót các cá thể.", "C. Phân hóa khả năng sống sót và sinh sản của cá thể.", "D. Khả năng sống sót kiểu gen khác nhau."], ans: 2, exp: "Darwin chưa biết 'kiểu gen', nên loại các đáp án có chữ này." },
    { q: "Câu 17. Nguyên nhân tiến hóa theo Darwin:", opts: ["A. Môi trường thay đổi từ từ, sinh vật tự vươn lên.", "B. Tác động của CLTN qua tính biến dị và di truyền.", "C. Tích lũy biến dị có lợi, đào thải biến dị có hại.", "D. Di truyền tập tính phát sinh."], ans: 1, exp: "Lamarck mới là tập tính vươn lên. Darwin nhấn mạnh CLTN tác động lên biến dị & di truyền." },
    { q: "Câu 18. Biến dị cá thể di truyền qua quá trình nào?", opts: ["A. Tương tác môi trường.", "B. Sinh sản.", "C. CLTN.", "D. CLNT."], ans: 1, exp: "Sinh sản là con đường truyền đạt vật chất di truyền." },
    { q: "Câu 19. Tác động của CLTN là:", opts: ["A. Tích lũy đặc tính thu được dưới ngoại cảnh.", "B. Tích lũy biến dị có lợi, đào thải có hại cho bản thân sinh vật.", "C. Tích lũy có lợi cho con người.", "D. Đào thải kiểu gen kém thích nghi."], ans: 1, exp: "Ý C là CLNT. Ý D là tiến hóa hiện đại (nhắc đến kiểu gen)." },
    { q: "Câu 20. Sâu có màu xanh như lá hình thành do:", opts: ["A. CLTN tích lũy biến dị cá thể màu xanh qua nhiều thế hệ.", "B. Thức ăn lá xanh làm biến đổi.", "C. Tự biến màu để thích nghi.", "D. Chim không ăn màu xanh."], ans: 0, exp: "Theo Darwin, CLTN giữ lại những con sâu có biến dị màu xanh (sẵn có) vì chúng khó bị phát hiện." },
    { q: "Câu 21. Điều quan trọng nhất làm vật nuôi phân li tính trạng:", opts: ["A. Khai thác đặc điểm có lợi.", "B. Loại bỏ trung gian.", "C. Trong mỗi loài, quá trình CLNT tiến hành theo những hướng khác nhau.", "D. CLNT theo một hướng xác định."], ans: 2, exp: "Nhu cầu con người rất đa dạng (người thích gà lấy thịt, người thích lấy trứng) nên phân li theo nhiều hướng." },
    { q: "Câu 22. Tiến hóa nhỏ là quá trình:", opts: ["A. Hình thành nhóm phân loại trên loài.", "B. Duy trì ổn định kiểu gen.", "C. Biến đổi tần số allele và thành phần kiểu gen.", "D. Củng cố allele trung tính."], ans: 2, exp: "Định nghĩa cốt lõi của Tiến hóa nhỏ." },
    { q: "Câu 23. Nhân tố ít ảnh hưởng nhất đến cân bằng Hardy-Weinberg?", opts: ["A. Phiêu bạt di truyền.", "B. Dòng gen.", "C. Giao phối không ngẫu nhiên.", "D. Đột biến."], ans: 3, exp: "Tần số đột biến tự nhiên rất thấp (10^-6 - 10^-4) nên thay đổi rất chậm." },
    { q: "Câu 24. Hạt phấn bay sang quần thể khác là:", opts: ["A. Biến động di truyền.", "B. Dòng gen.", "C. Giao phối không ngẫu nhiên.", "D. Thoái hóa giống."], ans: 1, exp: "Sự phát tán cá thể/giao tử giữa các quần thể là Dòng gen (Di nhập gen)." },
    { q: "Câu 25. CLTN là nhân tố cơ bản nhất vì:", opts: ["A. Quy định chiều hướng, tốc độ biến đổi kiểu gen.", "B. Làm tăng phân hóa kiểu gen.", "C. Tác động trực tiếp lên kiểu gen.", "D. Làm tăng đa dạng."], ans: 0, exp: "CLTN là nhân tố duy nhất có hướng." },

    { q: "Câu 7. Có bao nhiêu nhận định ĐÚNG về tiến hóa nhỏ trong 5 ý?", ans: "4", exp: "Các ý 1, 2, 4, 5 đúng. Ý 3 sai vì TH nhỏ kết thúc bằng hình thành loài." },
    { q: "Câu 8. Đột biến gen gây hại nhưng vẫn có vai trò quan trọng (Bao nhiêu giải thích đúng)?", ans: "3", exp: "Gồm (2), (3), (4). Đột biến lặn là nguồn dự trữ." },
    { q: "Câu 9. Sinh giới tiến hóa theo bao nhiêu chiều hướng đúng?", ans: "3", exp: "Gồm 1, 2, 4. Ý 3 sai vì chiều hướng là từ DƯỚI NƯỚC LÊN CẠN." },
    { q: "Câu 10. Có bao nhiêu đặc điểm chỉ ở người hiện đại?", ans: "2", exp: "Chỉ có 1-Văn hóa tôn giáo và 5-Có lồi cằm." }
];

// ==================== RENDERING ENGINE ====================

// Render Part 1
const p1Container = document.getElementById('part1-container');
part1Data.forEach((item, qIndex) => {
    let card = document.createElement('div'); card.className = 'glass-card';
    card.style.animationDelay = `${(qIndex % 10) * 0.05}s`;
    let html = `<div class="q-text">${item.q}</div>`;
    item.opts.forEach((opt, oIndex) => {
        html += `<button class="opt-btn" onclick="checkP1(this, ${qIndex}, ${oIndex})">${opt}</button>`;
    });
    html += `<div class="explanation" id="exp1-${qIndex}"><b>Giải thích:</b> ${item.exp}</div>`;
    card.innerHTML = html; p1Container.appendChild(card);
});

function checkP1(btn, qIndex, oIndex) {
    let card = btn.parentElement;
    let buttons = card.querySelectorAll('.opt-btn');
    let correctIdx = part1Data[qIndex].ans;
    
    buttons.forEach(b => { b.disabled = true; b.style.cursor = 'default'; });
    
    if(oIndex === correctIdx) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('incorrect');
        buttons[correctIdx].classList.add('correct');
    }
    document.getElementById(`exp1-${qIndex}`).style.display = 'block';
}

// Render Part 2
const p2Container = document.getElementById('part2-container');
part2Data.forEach((item, qIndex) => {
    let card = document.createElement('div'); card.className = 'glass-card';
    let html = `<div class="q-text">${item.q}</div>`;
    
    item.stmts.forEach((stmt, sIndex) => {
        html += `
        <div class="tf-row">
            <div class="tf-text">${stmt.t}</div>
            <div class="tf-actions">
                <button class="tf-btn" onclick="checkP2(this, ${qIndex}, ${sIndex}, true)">ĐÚNG</button>
                <button class="tf-btn" onclick="checkP2(this, ${qIndex}, ${sIndex}, false)">SAI</button>
            </div>
        </div>
        <div class="explanation" id="exp2-${qIndex}-${sIndex}">${stmt.e}</div>
        `;
    });
    card.innerHTML = html; p2Container.appendChild(card);
});

function checkP2(btn, qIndex, sIndex, userChoice) {
    let row = btn.closest('.tf-row');
    let buttons = row.querySelectorAll('.tf-btn');
    let isCorrect = part2Data[qIndex].stmts[sIndex].a;

    buttons.forEach(b => { b.disabled = true; b.style.cursor = 'default'; });

    if(userChoice === isCorrect) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('incorrect');
        let correctBtnText = isCorrect ? "ĐÚNG" : "SAI";
        buttons.forEach(b => { if(b.innerText === correctBtnText) b.classList.add('correct'); });
    }
    document.getElementById(`exp2-${qIndex}-${sIndex}`).style.display = 'block';
}

// Render Part 3
const p3Container = document.getElementById('part3-container');
part3Data.forEach((item, qIndex) => {
    let card = document.createElement('div'); card.className = 'glass-card';
    card.innerHTML = `
        <div class="q-text">${item.q}</div>
        <div class="sa-wrap">
            <input type="text" class="sa-input" id="input3-${qIndex}" placeholder="Nhập đáp án...">
            <button class="sa-submit" onclick="checkP3(${qIndex}, this)">Kiểm Tra</button>
        </div>
        <div class="explanation" id="exp3-${qIndex}"><b>Giải thích:</b> ${item.exp}</div>
    `;
    p3Container.appendChild(card);
});

function checkP3(qIndex, btn) {
    let input = document.getElementById(`input3-${qIndex}`);
    let userAns = input.value.trim().toLowerCase();
    let correctAns = part3Data[qIndex].ans.toLowerCase();

    input.disabled = true; btn.disabled = true;
    
    if(userAns === correctAns) {
        input.classList.add('correct');
        btn.classList.add('correct');
        btn.innerText = "Chuẩn!";
    } else {
        input.classList.add('incorrect');
        btn.classList.add('incorrect');
        btn.innerText = "Sai!";
        input.value = `Sai! Đáp án: ${part3Data[qIndex].ans}`;
    }
    document.getElementById(`exp3-${qIndex}`).style.display = 'block';
}
</script>
